{% extends 'layout.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Register</h1>
    <form id="registerForm">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label for="first_name">First name</label>
                <input id="first_name" name="first_name" class="form-control" required>
            </div>
            <div class="form-group col-md-6">
                <label for="last_name">Last name</label>
                <input id="last_name" name="last_name" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" class="form-control" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" class="form-control" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="phone_number">Phone number</label>
            <input id="phone_number" name="phone_number" class="form-control" required>
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" class="form-control" autocomplete="new-password" required>
            </div>
            <div class="form-group col-md-6">
                <label for="password2">Confirm password</label>
                <input id="password2" name="password2" type="password" class="form-control" autocomplete="new-password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
        <p class="form-footer"><a href="/login">Already have an account?</a></p>
    </form>
</section>
{% endblock %}
