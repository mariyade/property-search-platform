[tool.pytest.ini_options]
testpaths = ["app/tests"]
pythonpath = [".", "playwright"]
markers = [
    "unit: focused tests for functions, schemas, and services",
    "integration: tests that exercise API routes, dependency wiring, the test database",
    "evaluation: DeepEval checks for agent response quality",
    "e2e: browser tests that exercise the application through the UI",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
