services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: property_search
      POSTGRES_PASSWORD: property_search
      POSTGRES_DB: property_search
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property_search -d property_search"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://property_search:property_search@postgres:5432/property_search
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-only-change-this-secret-key
      ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=1 --pool=solo
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://property_search:property_search@postgres:5432/property_search
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
