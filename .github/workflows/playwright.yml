name: Playwright E2E

on:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: property_search
          POSTGRES_PASSWORD: property_search
          POSTGRES_DB: property_search
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U property_search -d property_search"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg2://property_search:property_search@127.0.0.1:5433/property_search
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run migrations
        run: alembic upgrade head

      - name: Run Playwright tests
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8000/health/ && break
            sleep 1
          done
          pytest playwright/tests --html=playwright/reports/report.html --self-contained-html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/reports/
